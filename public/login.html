<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DoualaClean — Connexion</title><link rel="stylesheet" href="style.css">
</head><body>
<header>
  <h1>🌿 DoualaClean</h1>
  <nav><a href="index.html">Accueil</a><a href="register.html">Inscription</a></nav>
</header>
<div class="auth-wrap">
  <h2>🔐 Connexion</h2>
  <div class="alert alert-error" id="errMsg"></div>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
  </form>
  <div style="text-align:center;margin-top:10px">
    <a href="forgot-password.html" style="font-size:.85rem;color:#2e7d32">Mot de passe oublié ?</a>
  </div>
  <div class="switch">Pas de compte ? <a href="register.html">S'inscrire</a></div>
  <div style="margin-top:20px;padding:14px;background:#f1f8e9;border-radius:8px;font-size:.82rem;color:#555">
    <strong>Comptes de test :</strong><br>
    🔴 Admin : admin@doualaclean.cm / Admin@1234<br>
    🔵 Agent : agent@doualaclean.cm / Agent@1234<br>
    🟢 Citoyen : jean@example.cm / Jean@1234
  </div>
</div>
<script src="js/app.js"></script>
</body></html>
