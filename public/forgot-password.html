<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DoualaClean — Mot de passe oublié</title><link rel="stylesheet" href="style.css">
</head><body>
<header>
  <h1>🌿 DoualaClean</h1>
  <nav><a href="index.html">Accueil</a><a href="login.html">Connexion</a></nav>
</header>
<div class="auth-wrap">
  <h2>🔑 Mot de passe oublié</h2>
  <p style="text-align:center;color:#666;font-size:.88rem;margin-bottom:20px">Entrez votre email pour recevoir un lien de réinitialisation.</p>
  <div class="alert alert-error" id="errMsg"></div>
  <div class="alert alert-success" id="successMsg"></div>

  <div id="stepRequest">
    <form id="forgotForm">
      <label>Adresse email</label>
      <input type="email" id="emailInput" placeholder="votre@email.cm" required autocomplete="email">
      <button type="submit" class="btn btn-primary btn-full">Envoyer le lien</button>
    </form>
    <div class="switch"><a href="login.html">← Retour à la connexion</a></div>
  </div>

  <div id="stepToken" style="display:none">
    <div id="devTokenBox" style="display:none;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px;margin-bottom:18px;font-size:.83rem">
      <strong>🛠 Mode développement</strong><br>
      Votre token de réinitialisation :<br>
      <code id="tokenDisplay" style="word-break:break-all;background:#f5f5f5;padding:6px 8px;border-radius:4px;display:block;margin-top:6px;font-size:.78rem"></code>
      <button type="button" onclick="copyToken()" class="btn btn-outline" style="margin-top:8px;padding:5px 12px;font-size:.78rem">📋 Copier</button>
      <p style="color:#888;margin:6px 0 0;font-size:.76rem">En production, ce token serait envoyé par email.</p>
    </div>

    <form id="resetForm">
      <label>Token de réinitialisation</label>
      <input type="text" id="tokenInput" placeholder="Collez votre token ici" required>
      <label>Nouveau mot de passe <small>(min. 6 caractères)</small></label>
      <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required>
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required>
      <button type="submit" class="btn btn-primary btn-full">Réinitialiser le mot de passe</button>
    </form>
    <div class="switch"><a href="login.html">← Retour à la connexion</a></div>
  </div>
</div>
<script src="js/app.js"></script>
</body></html>
