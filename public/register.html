<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DoualaClean — Inscription</title><link rel="stylesheet" href="style.css">
</head><body>
<header>
  <h1>🌿 DoualaClean</h1>
  <nav><a href="index.html">Accueil</a><a href="login.html">Connexion</a></nav>
</header>
<div class="auth-wrap">
  <h2>📝 Créer un compte</h2>
  <div class="alert alert-error" id="errMsg"></div>
  <form id="registerForm">
    <label>Nom complet</label>
    <input type="text" id="nom" placeholder="Jean Mbarga" required>
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.cm" required>
    <label>Téléphone (optionnel)</label>
    <input type="tel" id="phone" placeholder="6XXXXXXXX">
    <label>Rôle *</label>
    <select id="role" required>
      <option value="">-- Choisir votre rôle --</option>
      <option value="citoyen">Citoyen</option>
      <option value="agent">Agent</option>
      <option value="admin">Administrateur</option>
    </select>
    <label>Mot de passe <small>(min. 6 caractères)</small></label>
    <input type="password" id="password" placeholder="Minimum 6 caractères" required>
    <label>Confirmer le mot de passe</label>
    <input type="password" id="password_confirmation" placeholder="Répétez le mot de passe" required>
    <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
  </form>
  <div class="switch">Déjà inscrit ? <a href="login.html">Se connecter</a></div>
</div>
<script src="js/app.js"></script>
</body></html>
