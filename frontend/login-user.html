<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DoualaClean — Connexion Citoyen</title><link rel="stylesheet" href="style.css">
</head><body>
<header>
  <h1>🌿 DoualaClean</h1>
  <nav><a href="index.html">Accueil</a><a href="register.html">Inscription</a></nav>
</header>
<div class="auth-wrap">
  <h2>👤 Connexion Citoyen</h2>
  <div class="alert alert-error" id="errMsg"></div>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" required>
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
  </form>
  <div class="switch">Pas de compte ? <a href="register.html">S'inscrire</a></div>
</div>
<script src="js/app.js"></script>
</body></html>
